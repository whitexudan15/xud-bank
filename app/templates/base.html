<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}XUD-Bank{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        :root {
            --xud-blue: #1A3A5C;
            --xud-accent: #2E86AB;
            --xud-light: #EBF4F8;
            --xud-low: #16A34A;
            --xud-medium: #D97706;
            --xud-high: #DC2626;
            --xud-critical: #7C3AED;
        }

        body {
            background: #F8FAFC;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: var(--xud-blue) !important;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff !important;
        }

        .nav-link {
            color: rgba(255, 255, 255, .8) !important;
        }

        .nav-link:hover {
            color: #fff !important;
        }

        .sidebar {
            min-height: calc(100vh - 56px);
            background: var(--xud-blue);
            padding-top: 1rem;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, .75);
            border-radius: 6px;
            margin: 2px 8px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: var(--xud-accent);
            color: #fff;
        }

        .sidebar .nav-link i {
            width: 20px;
        }

        .main-content {
            padding: 2rem;
        }

        .badge-LOW {
            background: var(--xud-low) !important;
        }

        .badge-MEDIUM {
            background: var(--xud-medium) !important;
        }

        .badge-HIGH {
            background: var(--xud-high) !important;
        }

        .badge-CRITICAL {
            background: var(--xud-critical) !important;
        }

        .card-stat {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .card-stat .card-body {
            padding: 1.5rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        #ws-status {
            font-size: .75rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-3">
            <a class="navbar-brand" href="/"><i class="bi bi-shield-lock me-2"></i>XUD-Bank</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                {% if user %}
                <span class="text-white-50 small">
                    <i class="bi bi-person-circle me-1"></i>{{ user.username }}
                    <span class="badge bg-secondary ms-1">{{ user.role }}</span>
                </span>
                {% if user.role in ['admin','analyste'] %}
                <a href="/admin/dashboard" class="btn btn-sm btn-outline-light"><i
                        class="bi bi-graph-up me-1"></i>Dashboard</a>
                {% endif %}
                <a href="/auth/logout" class="btn btn-sm btn-danger"><i
                        class="bi bi-box-arrow-right me-1"></i>Déconnexion</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block body %}
    <!-- contenu sans sidebar -->
    {% block content %}{% endblock %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
