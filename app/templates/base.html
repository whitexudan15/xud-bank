<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Xud-Bank{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/app/css/base.css" />

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- ═══════════════════════════════ NAVBAR ════════════════════════════ -->
    <header class="xnav">
        <a class="nav-logo" href="/">
            <div class="logo-mark">X</div>
            <span class="brand">XUD<span>BANK</span></span>
        </a>
        <div class="nav-sep"></div>

        <div class="nav-actions">
            <button class="btn-theme" id="themeToggle" type="button">
                <i class="bi bi-sun-fill" id="themeIcon"></i>
            </button>

            {% if user %}
            <div class="u-pill">
                <div class="u-avatar">{{ user.username[:2] }}</div>
                <span class="u-name d-none d-sm-block">{{ user.username }}</span>
                <span class="u-role u-role-{{ user.role }}">{{ user.role }}</span>
            </div>
            <a href="/auth/logout" class="nav-btn nav-btn-danger">
                <i class="bi bi-box-arrow-right"></i>
                <span class="d-none d-sm-inline">Déconnexion</span>
            </a>
            {% endif %}
        </div>
    </header>

    {% block body %}
    {% block content %}{% endblock %}
    {% endblock %}

    <script>
        /* ── Theme ──────────────────────────────────────────────────────────── */
        (function () {
            const html = document.documentElement;
            const saved = localStorage.getItem('xud-theme') || 'dark';
            html.setAttribute('data-theme', saved);
            updateIcon(saved);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.addEventListener('click', () => {
                const t = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', t);
                localStorage.setItem('xud-theme', t);
                updateIcon(t);
                if (typeof refreshCharts === 'function') setTimeout(refreshCharts, 50);
            });
            function updateIcon(t) {
                const ic = document.getElementById('themeIcon');
                if (ic) ic.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
            }
        })();

        /* ── Sidebar stagger ────────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.sb-a').forEach((el, i) => {
                el.style.opacity = '0'; el.style.transform = 'translateX(-8px)';
                setTimeout(() => {
                    el.style.transition = 'opacity .25s ease,transform .25s ease,background .18s,color .18s,border-color .18s';
                    el.style.opacity = '1'; el.style.transform = 'translateX(0)';
                }, 60 + i * 42);
            });
            /* Animate counters */
            document.querySelectorAll('[data-count]').forEach(el => {
                const target = +el.dataset.count; if (!target) return;
                const dur = 1100, start = performance.now();
                const step = now => {
                    const p = Math.min((now - start) / dur, 1);
                    const e = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.round(e * target);
                    if (p < 1) requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
