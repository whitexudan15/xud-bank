{% extends "base.html" %}
{% block title %}Recrutement — Direction{% endblock %}

{% block body %}
<div class="app-shell">
    <nav class="xsidebar">
        <div class="sb-grp">
            <a class="sb-a active" href="/direction/dashboard"><i class="bi bi-house"></i>DIRECTION</a>
        </div>
        <div class="sb-grp">
            <div class="sb-grp-label">GESTION</div>
            <a class="sb-a active" href="/direction/users/new"><i class="bi bi-person-plus"></i>RECRUTER</a>
            <a class="sb-a" href="/direction/users"><i class="bi bi-people"></i>PERSONNEL</a>
            <a class="sb-a" href="/direction/accounts"><i class="bi bi-safe"></i>COMPTES BANCAIRES</a>
        </div>
    </nav>
    <main class="xmain">
        <div class="pg-hdr">
            <div>
                <h4><i class="bi bi-person-plus" style="color:var(--lime);margin-right:.5rem;"></i>Créer un utilisateur
                </h4>
                <p class="sub" style="margin-top:.5rem;">Ajouter un nouveau membre avec ses privilèges</p>
            </div>
            <a href="/direction/users" style="display:inline-flex;align-items:center;gap:.4rem;
               background:transparent;border:1.5px solid var(--time);border-radius:9px;
               color:var(--t2);padding:.4rem .9rem;font-size:.8rem;font-weight:600;text-decoration:none;">
                <i class="bi bi-arrow-left"></i>Retour
            </a>
        </div>

        <div class="xcard" style="max-width:520px;animation:fadeSlideUp .4s var(--ease) both;">
            <div class="xcard-body">

                {% if error %}
                <div style="display:flex;align-items:center;gap:.6rem;
                            background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.2);
                            border-radius:10px;padding:.65rem .9rem;margin-bottom:1.2rem;
                            font-size:.83rem;color:var(--s-hi);">
                    <i class="bi bi-exclamation-triangle-fill"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post" action="/direction/users/new" novalidate>

                    <div class="xfield">
                        <label>Nom d'utilisateur</label>
                        <div class="input-wrap">
                            <i class="bi bi-person fi"></i>
                            <input type="text" name="username" class="xinput" placeholder="dupont" required />
                        </div>
                    </div>

                    <div class="xfield">
                        <label>Adresse e-mail</label>
                        <div class="input-wrap">
                            <i class="bi bi-envelope fi"></i>
                            <input type="email" name="email" class="xinput" placeholder="dupont@xud-bank.com" required />
                        </div>
                    </div>

                    <div class="xfield">
                        <label>Mot de passe</label>
                        <div class="input-wrap">
                            <i class="bi bi-lock fi"></i>
                            <input type="password" name="password" class="xinput" placeholder="••••••••" required />
                        </div>
                    </div>

                    <div class="xfield">
                        <label>Rôle</label>
                        <div class="input-wrap">
                            <i class="bi bi-shield fi"></i>
                            <select name="role" class="xinput xselect" required>
                                {% for r in roles %}
                                <option value="{{ r }}">{{ r | capitalize }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-lime" style="margin-top:.8rem;">
                        <i class="bi bi-person-check-fill"></i>Créer l'utilisateur
                    </button>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}
