{% extends "base.html" %}
{% block title %}Inscription — XUD-Bank{% endblock %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
    style="background:linear-gradient(135deg,#1A3A5C 0%,#2E86AB 100%);">
    <div class="card shadow-lg" style="width:440px;border-radius:16px;border:none;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="mx-auto mb-3 d-flex align-items-center justify-content-center rounded-circle"
                    style="width:64px;height:64px;background:#EBF4F8;">
                    <i class="bi bi-person-plus-fill fs-2" style="color:#1A3A5C;"></i>
                </div>
                <h4 class="fw-bold mb-0" style="color:#1A3A5C;">Créer un compte</h4>
                <p class="text-muted small">Accès client XUD-Bank</p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span class="small">{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/auth/register" novalidate>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Nom d'utilisateur</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="jean.dupont" required />
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="jean@mail.com" required />
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
                    </div>
                </div>
                <button type="submit" class="btn w-100 text-white fw-semibold"
                    style="background:#1A3A5C;border-radius:8px;">
                    <i class="bi bi-person-check me-2"></i>Créer mon compte
                </button>
            </form>

            <hr class="my-4" />
            <p class="text-center text-muted small mb-0">
                Déjà un compte ?
                <a href="/auth/login" class="fw-semibold" style="color:#2E86AB;">Se connecter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
