{% extends "base.html" %}
{% block title %}403 — Accès refusé{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:#F8FAFC;">
    <div class="text-center">
        <div class="mb-4" style="font-size:5rem;color:#DC2626;">
            <i class="bi bi-shield-x"></i>
        </div>
        <h1 class="fw-bold mb-2" style="color:#1A3A5C;">403</h1>
        <h5 class="text-muted mb-1">Accès refusé</h5>
        <p class="text-muted small mb-4">Vous n'avez pas les privilèges nécessaires pour accéder à
            <code>{{ path }}</code>
        </p>
        <a href="/data/accounts" class="btn btn-primary me-2"><i class="bi bi-house me-1"></i>Accueil</a>
        <a href="/auth/logout" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right me-1"></i>Déconnexion</a>
    </div>
</div>
{% endblock %}
